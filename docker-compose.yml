services:
  onyx-mcp-hr:
    image: emirhancivil/onyx-mcp-hr:latest
    container_name: onyx-mcp-hr
    restart: unless-stopped
    ports:
      - "8016:8005"   # host 8016 -> container 8005 (MCP — Onyx buraya bağlanır)
      - "8018:8007"   # host 8018 -> container 8007 (nginx — chart/rapor servisi)
    volumes:
      # HR_DATA_DIR .env'de tanımlanır — kullanıcının kendi CV/Excel/anket klasörü
      - "${HR_DATA_DIR:-./data}:/app/data"
      - ./logs:/app/logs
    env_file:
      - .env
    environment:
      - TZ=Europe/Istanbul
