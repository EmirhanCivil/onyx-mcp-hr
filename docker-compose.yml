services:
  survey-excel-mcp:
    build: .
    container_name: survey-excel-mcp
    restart: unless-stopped
    ports:
      - "8005:8005"
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
    env_file:
      - .env
    environment:
      - TZ=Europe/Istanbul
      - CV_UPLOAD_DIR=/app/data/uploads/cv
      - EXCEL_UPLOAD_DIR=/app/data/uploads/excel
      - SURVEY_UPLOAD_DIR=/app/data/uploads/survey
