services:
  onyx-mcp-hr:
    image: emirhancivil/onyx-mcp-hr:latest
    container_name: onyx-mcp-hr
    restart: unless-stopped
    ports:
      - "8005:8005"   # MCP server (Onyx buraya bağlanır)
      - "8007:8007"   # Üretilen chart/rapor dosyaları (nginx)
    volumes:
      # HR_DATA_DIR .env'de tanımlanır — kullanıcının kendi CV/Excel/anket klasörü
      - "${HR_DATA_DIR:-./data}:/app/data"
      - ./logs:/app/logs
    env_file:
      - .env
    environment:
      - TZ=Europe/Istanbul
