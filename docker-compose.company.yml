services:
  survey-excel-mcp:
    image: memobaba44/survey-excel-mcp:latest
    container_name: survey-excel-mcp-onyx
    restart: unless-stopped
    ports:
      - "8006:8005"
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
      - ./app:/app/app:ro
    environment:
      TZ: Europe/Istanbul
      MCP_HOST: 0.0.0.0
      MCP_PORT: 8005
      MCP_TRANSPORT: http
      MCP_PATH: /mcp
      DATA_DIR: /app/data
      UPLOAD_DIR: /app/data/uploads
      CV_UPLOAD_DIR: /app/data/uploads/cv
      EXCEL_UPLOAD_DIR: /app/data/uploads/excel
      SURVEY_UPLOAD_DIR: /app/data/uploads/survey
      PROCESSED_DIR: /app/data/processed
      OUTPUT_DIR: /app/data/outputs
      CHART_DIR: /app/data/outputs/charts
      REPORT_DIR: /app/data/outputs/reports
      EXPORT_DIR: /app/data/outputs/exports
      LOG_DIR: /app/logs
      LOG_LEVEL: INFO
      AUTO_LOAD_ENABLED: "false"
      AUTO_SCAN_UPLOADS_ENABLED: "true"
    networks:
      - onyx_default

  survey-excel-mcp-files:
    image: nginx:alpine
    container_name: survey-excel-mcp-files
    restart: unless-stopped
    ports:
      - "8007:80"
    volumes:
      - ./data/outputs:/usr/share/nginx/html:ro
      - ./nginx-files.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - onyx_default

networks:
  onyx_default:
    external: true
